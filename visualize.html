<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrends.dk - Project Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FAF9F6;
            color: #1E1E1E;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #E6E3DC;
        }
        .accent-primary { color: #264021; }
        .bg-accent-primary { background-color: #264021; }
        .border-accent-primary { border-color: #264021; }
        .tab-active {
            border-bottom: 2px solid #264021;
            color: #264021;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const KoalaIcon = ({ className }) => (
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" className={className}>
                <circle cx="25" cy="35" r="20" fill="currentColor" />
                <circle cx="25" cy="35" r="10" fill="#FAF9F6" />
                <circle cx="75" cy="35" r="20" fill="currentColor" />
                <circle cx="75" cy="35" r="10" fill="#FAF9F6" />
                <ellipse cx="50" cy="55" rx="40" ry="35" fill="currentColor" />
                <circle cx="35" cy="48" r="4.5" fill="#FAF9F6" />
                <circle cx="65" cy="48" r="4.5" fill="#FAF9F6" />
                <rect x="42" y="55" width="16" height="22" rx="8" fill="#FAF9F6" />
            </svg>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('tech');

            const techStack = [
                { name: 'Next.js 15', desc: 'App Router, Turbopack, Server Components & Middleware' },
                { name: 'Tailwind CSS 4', desc: 'Modern high-performance CSS engine with dynamic themes' },
                { name: 'GitHub Backend', desc: 'Git-as-a-database architecture via Octokit REST SDK' },
                { name: 'TypeScript & Zod', desc: 'Strict mode with schema-based input validation' },
                { name: 'Security+', desc: 'Strict CSP, HSTS, Middleware rate-limiting and Honeypot' },
                { name: 'Health Monitoring', desc: '/api/health endpoint for automated status tracking' }
            ];

            const todos = [
                { task: 'Set Vercel GitHub Env Vars', status: 'Pending', priority: 'Critical' },
                { task: 'Finalize MIT License file', status: 'Pending', priority: 'High' },
                { task: 'Configure Vercel Bot Protection', status: 'Planned', priority: 'Medium' },
                { task: 'Validate MCP searching local index', status: 'In Progress', priority: 'High' },
                { task: 'Implement full Supabase Auth', status: 'Planned', priority: 'Medium' }
            ];

            const features = [
                { title: 'Honeypot Protection', desc: 'Hidden bot-traps on all forms to prevent automated spam and DDoS-like submissions.' },
                { title: 'Edge Rate Limiting', desc: 'Middleware-based rate limit headers to guide agents and throttle excessive requests.' },
                { title: 'GitHub-as-a-Database', desc: 'Serverless persistence where user actions are committed directly to Git.' },
                { title: 'Agent-First UX', desc: 'Optimized for autonomous agents with ai.txt, ara.json, and ?format=json support.' },
                { title: 'Model Context Protocol', desc: 'Exposes community data as executable tools for agents (Cursor, Claude Desktop).' }
            ];

            return (
                <div className="max-w-4xl mx-auto px-6 py-12">
                    <header className="flex items-center space-x-4 mb-12">
                        <div className="bg-white p-3 rounded-2xl border border-[#E6E3DC] shadow-sm accent-primary">
                            <KoalaIcon className="w-12 h-12" />
                        </div>
                        <div>
                            <h1 className="text-3xl font-extrabold tracking-tight">vibetrends<span className="accent-primary">.dk</span></h1>
                            <p className="text-gray-500 font-semibold uppercase tracking-widest text-xs">Project Visualization</p>
                        </div>
                    </header>

                    <div className="flex space-x-8 mb-8 border-b border-[#E6E3DC]">
                        <button 
                            onClick={() => setActiveTab('tech')}
                            className={`pb-4 text-sm font-bold transition-all ${activeTab === 'tech' ? 'tab-active' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            Tech Stack
                        </button>
                        <button 
                            onClick={() => setActiveTab('todo')}
                            className={`pb-4 text-sm font-bold transition-all ${activeTab === 'todo' ? 'tab-active' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            Todo
                        </button>
                        <button 
                            onClick={() => setActiveTab('features')}
                            className={`pb-4 text-sm font-bold transition-all ${activeTab === 'features' ? 'tab-active' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            Features
                        </button>
                    </div>

                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        {activeTab === 'tech' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {techStack.map(t => (
                                    <div key={t.name} className="glass-card p-5 rounded-xl">
                                        <h3 className="font-bold accent-primary">{t.name}</h3>
                                        <p className="text-sm text-gray-500 mt-1">{t.desc}</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'todo' && (
                            <div className="glass-card rounded-xl overflow-hidden">
                                <table className="w-full text-left">
                                    <thead className="bg-gray-50 border-b border-[#E6E3DC]">
                                        <tr>
                                            <th className="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Task</th>
                                            <th className="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Status</th>
                                            <th className="px-6 py-3 text-xs font-bold text-gray-500 uppercase text-right">Priority</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-[#E6E3DC]">
                                        {todos.map(todo => (
                                            <tr key={todo.task}>
                                                <td className="px-6 py-4 text-sm font-semibold">{todo.task}</td>
                                                <td className="px-6 py-4 text-xs font-bold uppercase tracking-wider text-gray-400">{todo.status}</td>
                                                <td className="px-6 py-4 text-xs font-bold text-right accent-primary">{todo.priority}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'features' && (
                            <div className="space-y-4">
                                {features.map(f => (
                                    <div key={f.title} className="glass-card p-6 rounded-xl border-l-4 border-accent-primary">
                                        <h3 className="font-bold text-lg">{f.title}</h3>
                                        <p className="text-sm text-gray-600 mt-1 leading-relaxed">{f.desc}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <footer className="mt-16 text-center text-xs text-gray-400 font-medium">
                        &copy; 2026 vibetrends.dk &middot; Ship faster, stay cute 🐨
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
